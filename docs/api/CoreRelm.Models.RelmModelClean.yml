  assemblies:
  - CoreRelm
  namespace: CoreRelm.Models
  summary: Resets the current model instance with data from the specified <xref href="System.Data.DataRow" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    This method maps the columns in the provided <xref href="System.Data.DataRow" data-throw-if-not-resolved="false"></xref> to the model's
        properties based on underscore naming conventions. If a property has a <xref href="Newtonsoft.Json.JsonConverterAttribute" data-throw-if-not-resolved="false"></xref>,
        the data is deserialized using the specified JSON converter. The method supports both default column names
        and column names suffixed with the table name.
  example: []
  syntax:
    content: public virtual IRelmModel ResetWithData(DataRow modelData, string? alternateTableName = null)
    parameters:
    - id: modelData
      type: System.Data.DataRow
      description: The <xref href="System.Data.DataRow" data-throw-if-not-resolved="false"></xref> containing the data to populate the model. The column names in the <xref href="System.Data.DataRow" data-throw-if-not-resolved="false"></xref> should match the model's property names, using underscore naming conventions.
    - id: alternateTableName
      type: System.String
      description: >-
        An optional alternate table name used to match column names in the <xref href="System.Data.DataRow" data-throw-if-not-resolved="false"></xref>. If not provided,
            the model's type name is used as the table name.
    return:
      type: CoreRelm.Interfaces.IRelmModel
      description: The current model instance, updated with the data from the specified <xref href="System.Data.DataRow" data-throw-if-not-resolved="false"></xref>.
    content.vb: Public Overridable Function ResetWithData(modelData As DataRow, alternateTableName As String = Nothing) As IRelmModel
