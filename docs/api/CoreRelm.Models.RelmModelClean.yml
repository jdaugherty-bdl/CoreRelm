  summary: >-
    Represents a base model for entities in the Relm framework, providing core attributes and functionality for data

    manipulation, database operations, and DTO generation.
  remarks: >-
    The <xref href="CoreRelm.Models.RelmModelClean" data-throw-if-not-resolved="false"></xref> class serves as a foundational class for entities, offering
        features such as: <ul><li>Data population from database
        rows via <xref href="CoreRelm.Models.RelmModelClean.ResetWithData(System.Data.DataRow%2cSystem.String)" data-throw-if-not-resolved="false"></xref>.</li><li>Bulk database write operations through various
