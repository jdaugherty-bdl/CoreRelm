  assemblies:
  - CoreRelm
  namespace: CoreRelm.Models
  summary: >-
    Generates a dynamic Data Transfer Object (DTO) containing properties from the current object based on

    specific inclusion and exclusion criteria.
  remarks: >-
    This method supports recursive generation of DTOs for nested objects. If a property
        is a collection of objects, each item in the collection is processed recursively. Properties not marked with
        the <xref href="CoreRelm.Attributes.RelmDto" data-throw-if-not-resolved="false"></xref> attribute are included only if explicitly specified in <code class="paramref">includeProperties</code>.
  example: []
  syntax:
    content: public dynamic GenerateDTO(IEnumerable<string>? includeProperties = null, IEnumerable<string>? excludeProperties = null, string? sourceObjectName = null, Func<IRelmModel, Dictionary<string, object>>? getAdditionalObjectProperties = null, int iteration = 0)
    parameters:
    - id: includeProperties
      type: System.Collections.Generic.IEnumerable{System.String}
      description: A collection of property names to explicitly include in the DTO, even if they are not marked with the <xref href="CoreRelm.Attributes.RelmDto" data-throw-if-not-resolved="false"></xref> attribute.
    - id: excludeProperties
      type: System.Collections.Generic.IEnumerable{System.String}
      description: A collection of property names to explicitly exclude from the DTO, even if they are marked with the <xref href="CoreRelm.Attributes.RelmDto" data-throw-if-not-resolved="false"></xref> attribute.
    - id: sourceObjectName
      type: System.String
      description: An optional string representing the source object name, used to resolve nested property paths.
    - id: getAdditionalObjectProperties
      type: System.Func{CoreRelm.Interfaces.IRelmModel,System.Collections.Generic.Dictionary{System.String,System.Object}}
      description: >-
        A function that provides additional properties to include in the DTO. The function takes the current object
            as input and returns a dictionary of property names and values.
    - id: iteration
      type: System.Int32
      description: The current recursion depth, used internally to track nested object processing. Defaults to 0.
    return:
      type: dynamic
      description: >-
        A dynamic object containing the selected properties from the current object. The resulting object includes
            properties marked with the <xref href="CoreRelm.Attributes.RelmDto" data-throw-if-not-resolved="false"></xref> attribute,  explicitly included properties, and additional
            properties provided by the <code class="paramref">getAdditionalObjectProperties</code> function, while excluding
            explicitly excluded properties.
    content.vb: Public Function GenerateDTO(includeProperties As IEnumerable(Of String) = Nothing, excludeProperties As IEnumerable(Of String) = Nothing, sourceObjectName As String = Nothing, getAdditionalObjectProperties As Func(Of IRelmModel, Dictionary(Of String, Object)) = Nothing, iteration As Integer = 0) As Object
  overload: CoreRelm.Models.RelmModelClean.GenerateDTO*
  implements:
