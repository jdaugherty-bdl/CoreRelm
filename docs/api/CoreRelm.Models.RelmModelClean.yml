  assemblies:
  - CoreRelm
  namespace: CoreRelm.Models
  summary: Writes the current object to the database using the table specified in the <code>RelmTable</code> attribute.
  remarks: >-
    This method performs a bulk write operation to the database. The table to which the
        data is written  is determined by the <code>RelmTable</code> attribute applied to the current object's type. 
        Ensure that the database schema matches the structure of the object being written.
  example: []
  syntax:
    content: public int WriteToDatabase(Enum connectionName, int batchSize = 100, bool allowAutoIncrementColumns = false, bool allowPrimaryKeyColumns = false, bool allowUniqueColumns = false, bool allowAutoDateColumns = false)
    parameters:
    - id: connectionName
      type: System.Enum
    - id: batchSize
      type: System.Int32
      description: The number of items to write to the database per batch. Must be a positive integer. Defaults to 100.
    - id: allowAutoIncrementColumns
      type: System.Boolean
      description: A value indicating whether columns with auto-increment constraints are allowed to be written.  Set to <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> to allow writing to such columns; otherwise, <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    - id: allowPrimaryKeyColumns
      type: System.Boolean
      description: >-
        A value indicating whether primary key columns are allowed to be written.  Set to <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> to
            allow writing to primary key columns; otherwise, <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    - id: allowUniqueColumns
      type: System.Boolean
      description: A value indicating whether unique constraint columns are allowed to be written.  Set to <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> to allow writing to such columns; otherwise, <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    - id: allowAutoDateColumns
      type: System.Boolean
      description: >-
        A value indicating whether columns with automatic date generation (e.g., timestamps) are allowed to be
            written.  Set to <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> to allow writing to such columns; otherwise, <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    return:
      type: System.Int32
      description: The number of rows successfully written to the database.
    content.vb: Public Function WriteToDatabase(connectionName As [Enum], batchSize As Integer = 100, allowAutoIncrementColumns As Boolean = False, allowPrimaryKeyColumns As Boolean = False, allowUniqueColumns As Boolean = False, allowAutoDateColumns As Boolean = False) As Integer
