  summary: Writes the current object to the database using the table specified in the <code>RelmTable</code> attribute.
  remarks: >-
    This method performs a bulk write operation, which can improve performance when
        writing large datasets. Ensure that the specified options and constraints align with the database schema to
        avoid runtime errors.
  example: []
  syntax:
    content: public int WriteToDatabase(RelmContextOptions relmContextOptions, int batchSize = 100, bool allowAutoIncrementColumns = false, bool allowPrimaryKeyColumns = false, bool allowUniqueColumns = false, bool allowAutoDateColumns = false)
    parameters:
    - id: relmContextOptions
