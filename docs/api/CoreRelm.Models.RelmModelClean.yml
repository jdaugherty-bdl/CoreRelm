  summary: >-
    Initializes a new instance of the <xref href="CoreRelm.Models.RelmModel" data-throw-if-not-resolved="false"></xref> class by copying all writable properties  from the

    specified source model.
  remarks: >-
    This constructor performs a shallow copy of all writable properties from the
        specified source model  to the new instance. Only properties with matching names and compatible types
        between the source  and target models are copied. Properties that are read-only or do not exist in the
        target model  are ignored.
