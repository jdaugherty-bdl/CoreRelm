    - id: batchSize
      type: System.Int32
      description: The number of records to process in each batch. Defaults to 100.
    - id: allowAutoIncrementColumns
      type: System.Boolean
      description: >-
        A value indicating whether columns with auto-increment constraints are allowed to be written. Defaults to
            <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    - id: allowPrimaryKeyColumns
