  summary: >-
    Represents a base model for entities in the Relm framework, providing core attributes and functionality for data

    manipulation, database operations, and DTO generation.
  remarks: >-
    The <xref href="CoreRelm.Models.RelmModel" data-throw-if-not-resolved="false"></xref> class serves as a foundational class for entities, offering
        features such as: <ul><li>Core attributes like <xref href="CoreRelm.Models.RelmModel.Id" data-throw-if-not-resolved="false"></xref>, <xref href="CoreRelm.Models.RelmModel.Active" data-throw-if-not-resolved="false"></xref>, <xref href="CoreRelm.Models.RelmModel.InternalId" data-throw-if-not-resolved="false"></xref>, <xref href="CoreRelm.Models.RelmModel.CreateDate" data-throw-if-not-resolved="false"></xref>, and <xref href="CoreRelm.Models.RelmModel.LastUpdated" data-throw-if-not-resolved="false"></xref>.</li><li>Support for resetting
        attributes to default values using <xref href="CoreRelm.Models.RelmModel.ResetCoreAttributes(System.Boolean%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref>.</li><li>Data population from database
        rows via <xref href="CoreRelm.Models.RelmModel.ResetWithData(System.Data.DataRow%2cSystem.String)" data-throw-if-not-resolved="false"></xref>.</li><li>Bulk database write operations through various
        <code>WriteToDatabase</code> overloads.</li><li>Dynamic Data Transfer Object (DTO) generation with GenerateDTO.</li></ul> This class is designed to be extended by specific entity types and provides
        a flexible foundation for working with relational data in the Relm framework.
  example: []
  syntax:
    content: >-
      [RelmFunction("uuid_v4", "\r\n        -- 16 cryptographically strong random bytes\r\n        DECLARE b BINARY(16);\r\n        SET b = RANDOM_BYTES(16);\r\n\r\n        -- Set version to 4 (0100xxxx) in byte 7 (1-indexed)\r\n        SET b = INSERT(b, 7, 1, CHAR((ASCII(SUBSTR(b, 7, 1)) & 15) | 64 USING latin1));\r\n\r\n        -- Set variant to RFC 4122 (10xxxxxx) in byte 9\r\n        SET b = INSERT(b, 9, 1, CHAR((ASCII(SUBSTR(b, 9, 1)) & 63) | 128 USING latin1));\r\n\r\n        -- Format as 8-4-4-4-12\r\n        RETURN LOWER(CONCAT(\r\n            HEX(SUBSTR(b,  1, 4)), '-',\r\n            HEX(SUBSTR(b,  5, 2)), '-',\r\n            HEX(SUBSTR(b,  7, 2)), '-',\r\n            HEX(SUBSTR(b,  9, 2)), '-',\r\n            HEX(SUBSTR(b, 11, 6))\r\n        ));", "CHAR", 36, "Generates a version 4 UUID as a string in the format 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx', where 'x' is any hexadecimal digit and 'y' is one of 8, 9, A, or B.", null, false, StoredProcedures.ProcedureDataAccess.NoSql, SecurityEnums.SqlSecurityLevel.Invoker)]

      [RelmTrigger(Triggers.TriggerTime.BEFORE, Triggers.TriggerEvent.INSERT, "\r\n    BEGIN\r\n        IF NEW.InternalId IS NULL OR NEW.InternalId = '' THEN\r\n            SET NEW.InternalId = uuid_v4();\r\n        END IF;\r\n    END", null, Triggers.TriggerOrdering.FOLLOWS, null)]

      public class RelmModel : RelmModelClean, IRelmModel, IRelmModelClean
    content.vb: >-
      <RelmFunction("uuid_v4", vbCrLf & "        -- 16 cryptographically strong random bytes" & vbCrLf & "        DECLARE b BINARY(16);" & vbCrLf & "        SET b = RANDOM_BYTES(16);" & vbCrLf & vbCrLf & "        -- Set version to 4 (0100xxxx) in byte 7 (1-indexed)" & vbCrLf & "        SET b = INSERT(b, 7, 1, CHAR((ASCII(SUBSTR(b, 7, 1)) & 15) | 64 USING latin1));" & vbCrLf & vbCrLf & "        -- Set variant to RFC 4122 (10xxxxxx) in byte 9" & vbCrLf & "        SET b = INSERT(b, 9, 1, CHAR((ASCII(SUBSTR(b, 9, 1)) & 63) | 128 USING latin1));" & vbCrLf & vbCrLf & "        -- Format as 8-4-4-4-12" & vbCrLf & "        RETURN LOWER(CONCAT(" & vbCrLf & "            HEX(SUBSTR(b,  1, 4)), '-'," & vbCrLf & "            HEX(SUBSTR(b,  5, 2)), '-'," & vbCrLf & "            HEX(SUBSTR(b,  7, 2)), '-'," & vbCrLf & "            HEX(SUBSTR(b,  9, 2)), '-'," & vbCrLf & "            HEX(SUBSTR(b, 11, 6))" & vbCrLf & "        ));", "CHAR", 36, "Generates a version 4 UUID as a string in the format 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx', where 'x' is any hexadecimal digit and 'y' is one of 8, 9, A, or B.", Nothing, False, StoredProcedures.ProcedureDataAccess.NoSql, SecurityEnums.SqlSecurityLevel.Invoker)>

      <RelmTrigger(Triggers.TriggerTime.BEFORE, Triggers.TriggerEvent.INSERT, vbCrLf & "    BEGIN" & vbCrLf & "        IF NEW.InternalId IS NULL OR NEW.InternalId = '' THEN" & vbCrLf & "            SET NEW.InternalId = uuid_v4();" & vbCrLf & "        END IF;" & vbCrLf & "    END", Nothing, Triggers.TriggerOrdering.FOLLOWS, Nothing)>

