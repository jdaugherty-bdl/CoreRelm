    Use this method to specify an existing transaction for database commands. If a
        transaction is set, all subsequent operations will be executed within the context of that transaction until
        it is cleared or replaced.
  example: []
  syntax:
    content: public RelmContextOptions SetDatabaseTransaction(MySqlTransaction? transaction)
    parameters:
    - id: transaction
      type: MySql.Data.MySqlClient.MySqlTransaction
      description: >-
        The MySqlTransaction instance to associate with database operations. Can be null to clear the current
            transaction.
    return:
      type: CoreRelm.Options.RelmContextOptions
      description: The current instance of the <xref href="CoreRelm.Options.RelmContextOptionsBuilder" data-throw-if-not-resolved="false"></xref> class.
    content.vb: Public Function SetDatabaseTransaction(transaction As MySqlTransaction) As RelmContextOptions
