  assemblies:
  - CoreRelm
  namespace: CoreRelm.Interfaces
  summary: Resets the core attributes of the model to their default values.
  remarks: Resets fields <xref href="CoreRelm.Interfaces.IRelmModel.Id" data-throw-if-not-resolved="false"></xref>, <xref href="CoreRelm.Interfaces.IRelmModel.Active" data-throw-if-not-resolved="false"></xref>, <xref href="CoreRelm.Interfaces.IRelmModel.InternalId" data-throw-if-not-resolved="false"></xref>, and <xref href="CoreRelm.Interfaces.IRelmModel.CreateDate" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: IRelmModel ResetCoreAttributes(bool nullInternalId = false, bool resetCreateDate = true)
    parameters:
    - id: nullInternalId
      type: System.Boolean
      description: A value indicating whether the internal ID should be set to <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>.  Pass <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> to nullify the internal ID; otherwise, <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    - id: resetCreateDate
      type: System.Boolean
      description: A value indicating whether the creation date should be reset to the current date and time.  Pass <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> to reset the creation date; otherwise, <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    return:
      type: CoreRelm.Interfaces.IRelmModel
      description: The updated model instance with the core attributes reset.
    content.vb: Function ResetCoreAttributes(nullInternalId As Boolean = False, resetCreateDate As Boolean = True) As IRelmModel
