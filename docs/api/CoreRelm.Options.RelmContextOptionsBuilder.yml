  namespace: CoreRelm.Options
  summary: Specifies whether zero date values should be converted to DateTime.MinValue when retrieving data.
  remarks: >-
    Zero date values are commonly used in some databases to represent an undefined or
        missing date. Enabling this option allows such values to be mapped to DateTime.MinValue in .NET, which may
        simplify handling of missing dates in application code.
  example: []
  syntax:
    content: public RelmContextOptionsBuilder SetConvertZeroDateTime(bool convertZeroDateTime)
    parameters:
