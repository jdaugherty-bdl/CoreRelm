  namespace: CoreRelm.Options
  summary: Sets the lock wait timeout period, in seconds, for acquiring a lock.
  remarks: >-
    If the timeout is set to zero, the method will not wait and will attempt to acquire
        the lock immediately. Setting an appropriate timeout can help prevent deadlocks in concurrent
        scenarios.
  example: []
  syntax:
    content: public RelmContextOptionsBuilder SetLockWaitTimeoutSeconds(int lockWaitTimeoutSeconds)
    parameters:
    - id: lockWaitTimeoutSeconds
      type: System.Int32
      description: The maximum number of seconds to wait for a lock to be acquired. Must be a non-negative value.
    return:
