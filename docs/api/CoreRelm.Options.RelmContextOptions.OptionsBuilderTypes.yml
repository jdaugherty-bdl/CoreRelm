  summary: Specifies the types of options that can be used to configure a database context using an options builder.
  remarks: >-
    Use this enumeration to indicate how the options builder should obtain or interpret
        connection information when configuring a database context. The selected value determines whether a raw
        connection string, a named connection string, or an existing open connection is used.
